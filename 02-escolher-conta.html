<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja - Escolher Conta</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue:#1A56FF;--gray-light:#F5F7FA;--gray-mid:#E2E8F0;--gray-text:#6B7280;--black:#0F172A;--white:#FFFFFF; }
  body { font-family:'Sora',sans-serif; background:var(--gray-light); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .phone-frame { width:390px; min-height:844px; background:var(--white); border-radius:40px; box-shadow:0 32px 80px rgba(0,0,0,.15); overflow:hidden; display:flex; flex-direction:column; }
  .top-bar { background:#4285F4; height:6px; }
  .content { padding:40px 28px 32px; flex:1; display:flex; flex-direction:column; }
  .google-header { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
  .google-header svg { width:22px; height:22px; }
  .google-header span { font-size:13px; color:var(--gray-text); }
  h1 { font-size:22px; font-weight:700; color:var(--black); margin-bottom:8px; }
  .subtitle { font-size:13px; color:var(--gray-text); margin-bottom:28px; }
  .account-list { display:flex; flex-direction:column; gap:4px; margin-bottom:24px; }
  .account-item {
    display:flex; align-items:center; gap:14px;
    padding:14px 16px; border-radius:10px; cursor:pointer;
    transition:background 0.15s; text-decoration:none;
  }
  .account-item:hover { background:var(--gray-light); }
  .avatar {
    width:40px; height:40px; border-radius:50%;
    background:var(--blue); color:white;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:16px; flex-shrink:0;
  }
  .acc-info .name { font-size:14px; font-weight:600; color:var(--black); }
  .acc-info .email { font-size:12px; color:var(--gray-text); }
  .add-account {
    display:flex; align-items:center; gap:14px;
    padding:14px 16px; border-radius:10px; cursor:pointer;
    text-decoration:none; transition:background 0.15s;
  }
  .add-account:hover { background:var(--gray-light); }
  .add-icon {
    width:40px; height:40px; border-radius:50%;
    border:2px dashed var(--gray-mid);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; color:var(--gray-text);
  }
  .add-account span { font-size:14px; color:var(--gray-text); font-weight:500; }
  .divider { height:1px; background:var(--gray-mid); margin:20px 0; }
  .footer-links { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
  .footer-links a { font-size:11px; color:var(--gray-text); text-decoration:none; }
  .footer-links a:hover { color:var(--blue); }
  .lang { font-size:12px; color:var(--gray-text); text-align:center; margin-bottom:12px; }
  .back-link { display:flex; align-items:center; gap:6px; color:var(--blue); font-size:13px; text-decoration:none; margin-bottom:20px; font-weight:500; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="top-bar"></div>
  <div class="content">
    <a href="01-login.html" class="back-link">← Voltar</a>
    <div class="google-header">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      <span>Fazer login com o Google</span>
    </div>
    <h1>Escolha uma conta</h1>
    <p class="subtitle">para continuar no Minha Loja</p>
    <div class="account-list">
      <a href="06-dashboard.html" class="account-item">
        <div class="avatar">U</div>
        <div class="acc-info">
          <div class="name">User</div>
          <div class="email">user@gmail.com.br</div>
        </div>
      </a>
      <a href="../dashboard/code.html" class="account-item">
        <div class="avatar" style="background:#34A853;">2</div>
        <div class="acc-info">
          <div class="name">User 2</div>
          <div class="email">user2@gmail.com.br</div>
        </div>
      </a>
      <a href="01-login.html" class="add-account">
        <div class="add-icon">+</div>
        <span>Use Another Account</span>
      </a>
    </div>
    <div class="divider"></div>
    <p class="lang">Português (Brasil)</p>
    <div class="footer-links">
      <a href="#">Ajuda</a>
      <a href="#">Privacidade</a>
      <a href="#">Termos</a>
    </div>
  </div>
</div>
</body>
</html>
