<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1A56FF;
    --blue-dark: #1240CC;
    --gray-light: #F5F7FA;
    --gray-mid: #E2E8F0;
    --gray-text: #6B7280;
    --black: #0F172A;
    --white: #FFFFFF;
    --error: #EF4444;
  }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--gray-light);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phone-frame {
    width: 390px;
    min-height: 844px;
    background: var(--white);
    border-radius: 40px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.15);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .top-bar {
    background: var(--blue);
    height: 6px;
    width: 100%;
  }
  .content {
    padding: 48px 32px 32px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
  }
  .logo-icon {
    width: 64px;
    height: 64px;
    background: var(--blue);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
  }
  .logo-icon svg { width: 36px; height: 36px; fill: white; }
  .logo-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-text);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--black);
    text-align: center;
    margin-bottom: 32px;
  }
  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-text);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--gray-mid);
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    color: var(--black);
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--blue); }
  .pass-wrap { position: relative; }
  .pass-wrap input { padding-right: 44px; }
  .toggle-pass {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--gray-text);
    font-size: 16px; padding: 0;
  }
  .remember-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    margin-top: 4px;
  }
  .remember-row label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--gray-text);
    text-transform: none; letter-spacing: 0;
  }
  .remember-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--blue); }
  .forgot { font-size: 13px; color: var(--blue); text-decoration: none; font-weight: 500; }
  .btn-primary {
    width: 100%;
    padding: 15px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    display: block;
    text-align: center;
  }
  .btn-primary:hover { background: var(--blue-dark); }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
    color: var(--gray-text); font-size: 13px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--gray-mid);
  }
  .btn-google {
    width: 100%;
    padding: 13px;
    background: white;
    color: var(--black);
    border: 1.5px solid var(--gray-mid);
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    text-decoration: none;
    transition: border-color 0.2s;
  }
  .btn-google:hover { border-color: var(--blue); }
  .google-icon { width: 20px; height: 20px; }
  .register-row {
    text-align: center; margin-top: 24px;
    font-size: 13px; color: var(--gray-text);
  }
  .register-row a { color: var(--blue); font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="top-bar"></div>
  <div class="content">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <span class="logo-name">Minha Loja</span>
    </div>
    <h1>Bem vindo 👋</h1>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" placeholder="user@gmail.com" value="user@gmail.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <div class="pass-wrap">
        <input type="password" placeholder="••••••••••" value="senha123">
        <button class="toggle-pass">👁</button>
      </div>
    </div>
    <div class="remember-row">
      <label><input type="checkbox" checked> Lembrar senha</label>
      <a href="03-redefinir-senha.html" class="forgot">Esqueci minha senha</a>
    </div>
    <a href="06-dashboard.html" class="btn-primary">Entrar</a>
    <div class="divider">OU</div>
    <a href="02-escolher-conta.html" class="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuar com Google
    </a>
    <p class="register-row">Não tem conta? <a href="05-criar-usuario.html">Criar conta</a></p>
  </div>
</div>
</body>
</html>
