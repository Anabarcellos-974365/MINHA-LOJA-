<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja - Horários</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--blue:#1A56FF;--blue-dark:#1240CC;--gray-light:#F5F7FA;--gray-mid:#E2E8F0;--gray-text:#6B7280;--black:#0F172A;--white:#FFFFFF}
  body{font-family:'Sora',sans-serif;background:var(--gray-light);min-height:100vh;display:flex;align-items:center;justify-content:center}
  .phone-frame{width:390px;min-height:844px;background:var(--white);border-radius:40px;box-shadow:0 32px 80px rgba(0,0,0,.15);overflow:hidden;display:flex;flex-direction:column}
  .header{background:var(--blue);padding:14px 20px;color:white}
  .steps-nav{display:flex;justify-content:center;gap:8px}
  .step-item{display:flex;flex-direction:column;align-items:center;gap:4px}
  .step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .step-circle.done{background:#22C55E;color:white}
  .step-circle.active{background:white;color:var(--blue)}
  .step-circle.inactive{background:rgba(255,255,255,.3);color:rgba(255,255,255,.7);font-size:11px}
  .step-label{font-size:10px;color:rgba(255,255,255,.8);text-align:center;max-width:60px}
  .step-connector{width:30px;height:2px;background:rgba(255,255,255,.5);margin-top:14px}
  .content{flex:1;padding:20px 24px;overflow-y:auto}
  h1{font-size:18px;font-weight:700;color:var(--black);margin-bottom:4px}
  .subtitle{font-size:12px;color:var(--gray-text);margin-bottom:20px;line-height:1.5}
  .day-row{padding:14px 0;border-bottom:1px solid var(--gray-mid)}
  .day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .day-name{font-size:14px;font-weight:600;color:var(--black)}
  .toggle-wrap{display:flex;align-items:center;gap:6px}
  .toggle-label{font-size:12px;color:var(--gray-text)}
  .toggle{width:42px;height:24px;border-radius:12px;position:relative;cursor:pointer;transition:background .2s;border:none;outline:none}
  .toggle.on{background:var(--blue)}
  .toggle.off{background:var(--gray-mid)}
  .toggle-thumb{position:absolute;top:2px;width:20px;height:20px;border-radius:50%;background:white;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle.on .toggle-thumb{left:20px}
  .toggle.off .toggle-thumb{left:2px}
  .day-options{margin-bottom:8px}
  .radio-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;color:var(--gray-text)}
  .radio-row input[type=radio]{accent-color:var(--blue);width:16px;height:16px}
  .time-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .time-label{font-size:12px;color:var(--gray-text);width:24px}
  select{padding:7px 10px;border:1.5px solid var(--gray-mid);border-radius:8px;font-family:'Sora',sans-serif;font-size:13px;color:var(--black);outline:none;background:white}
  select:focus{border-color:var(--blue)}
  .time-actions{display:flex;gap:8px;margin-left:auto}
  .time-act-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--gray-text);padding:4px}
  .closed-label{font-size:13px;color:var(--gray-text);font-style:italic}
  .btn-primary{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:block;margin-top:20px}
  .btn-primary:hover{background:var(--blue-dark)}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="header">
    <div class="steps-nav">
      <div class="step-item">
        <div class="step-circle done">✓</div>
        <div class="step-label">Informações do Local</div>
      </div>
      <div class="step-connector"></div>
      <div class="step-item">
        <div class="step-circle done">✓</div>
        <div class="step-label">Revisar Local</div>
      </div>
      <div class="step-connector"></div>
      <div class="step-item">
        <div class="step-circle active">3</div>
        <div class="step-label">Horários</div>
      </div>
    </div>
  </div>
  <div class="content">
    <h1>Horários de Funcionamento</h1>
    <p class="subtitle">Informe os horários de atendimento do seu local.</p>

    <!-- Quinta-feira -->
    <div class="day-row">
      <div class="day-header">
        <span class="day-name">Quinta-feira</span>
        <div class="toggle-wrap">
          <button class="toggle on" onclick="toggleDay(this)"><div class="toggle-thumb"></div></button>
          <span class="toggle-label">Aberto</span>
        </div>
      </div>
      <div class="day-options day-body">
        <div class="radio-row"><input type="radio" name="qui"> Aberto 24h</div>
        <div class="time-row">
          <span class="time-label">De</span>
          <select><option>08:00</option><option>09:00</option><option>10:00</option></select>
          <span style="font-size:12px;color:var(--gray-text)">Até</span>
          <select><option>12:00</option><option>13:00</option><option>14:00</option></select>
          <div class="time-actions"><button class="time-act-btn">🗑</button><button class="time-act-btn">+</button></div>
        </div>
        <div class="time-row">
          <span class="time-label">De</span>
          <select><option>13:00</option><option>14:00</option></select>
          <span style="font-size:12px;color:var(--gray-text)">Até</span>
          <select><option>18:00</option><option>19:00</option></select>
          <div class="time-actions"><button class="time-act-btn">🗑</button></div>
        </div>
        <div class="radio-row"><input type="radio" name="qui"> Repetir</div>
      </div>
    </div>

    <!-- Sexta-feira -->
    <div class="day-row">
      <div class="day-header">
        <span class="day-name">Sexta-feira</span>
        <div class="toggle-wrap">
          <button class="toggle on" onclick="toggleDay(this)"><div class="toggle-thumb"></div></button>
          <span class="toggle-label">Aberto</span>
        </div>
      </div>
      <div class="day-options day-body">
        <div class="radio-row"><input type="radio" name="sex"> Aberto 24h</div>
        <div class="time-row">
          <span class="time-label">De</span>
          <select><option>08:00</option></select>
          <span style="font-size:12px;color:var(--gray-text)">Até</span>
          <select><option>12:00</option></select>
          <div class="time-actions"><button class="time-act-btn">🗑</button><button class="time-act-btn">+</button></div>
        </div>
        <div class="time-row">
          <span class="time-label">De</span>
          <select><option>13:00</option></select>
          <span style="font-size:12px;color:var(--gray-text)">Até</span>
          <select><option>18:00</option></select>
          <div class="time-actions"><button class="time-act-btn">🗑</button></div>
        </div>
        <div class="radio-row"><input type="radio" name="sex"> Repetir</div>
      </div>
    </div>

    <!-- Sábado -->
    <div class="day-row">
      <div class="day-header">
        <span class="day-name">Sábado</span>
        <div class="toggle-wrap">
          <button class="toggle off" onclick="toggleDay(this)"><div class="toggle-thumb"></div></button>
          <span class="toggle-label">Fechado</span>
        </div>
      </div>
    </div>

    <!-- Domingo -->
    <div class="day-row">
      <div class="day-header">
        <span class="day-name">Domingo</span>
        <div class="toggle-wrap">
          <button class="toggle off" onclick="toggleDay(this)"><div class="toggle-thumb"></div></button>
          <span class="toggle-label">Fechado</span>
        </div>
      </div>
    </div>

    <a href="../dashboard/code.html" class="btn-primary">Concluir</a>
  </div>
</div>
<script>
  function toggleDay(btn){
    const isOn=btn.classList.contains('on');
    btn.classList.toggle('on',!isOn);btn.classList.toggle('off',isOn);
    const label=btn.nextElementSibling;
    label.textContent=isOn?'Fechado':'Aberto';
    const dayRow=btn.closest('.day-row');
    const body=dayRow.querySelector('.day-body');
    if(body)body.style.display=isOn?'none':'block';
  }
</script>
</body>
</html>
