<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja - Editar Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--blue:#1A56FF;--blue-dark:#1240CC;--gray-light:#F5F7FA;--gray-mid:#E2E8F0;--gray-text:#6B7280;--black:#0F172A;--white:#FFFFFF}
  body{font-family:'Sora',sans-serif;background:var(--gray-light);min-height:100vh;display:flex;align-items:center;justify-content:center}
  .phone-frame{width:390px;min-height:844px;background:var(--white);border-radius:40px;box-shadow:0 32px 80px rgba(0,0,0,.15);overflow:hidden;display:flex;flex-direction:column;position:relative}
  .header{background:var(--blue);padding:16px 20px;color:white;display:flex;align-items:center;gap:12px}
  .back-btn{color:white;text-decoration:none;font-size:18px}
  .header-title{font-size:14px;font-weight:700;flex:1}
  .avatar-section{padding:24px;display:flex;flex-direction:column;align-items:center;border-bottom:1px solid var(--gray-mid)}
  .avatar{width:80px;height:80px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:32px;color:white;font-weight:700;position:relative}
  .avatar-edit{position:absolute;bottom:0;right:0;width:26px;height:26px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid var(--gray-mid)}
  .user-name{font-size:16px;font-weight:700;color:var(--black);margin-top:10px}
  .user-email{font-size:13px;color:var(--gray-text);margin-top:2px}
  .menu-list{flex:1;padding:8px 0;overflow-y:auto;padding-bottom:80px}
  .menu-section-title{font-size:11px;font-weight:700;color:var(--gray-text);text-transform:uppercase;letter-spacing:.08em;padding:16px 20px 8px}
  .menu-item{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;text-decoration:none;transition:background .15s}
  .menu-item:hover{background:var(--gray-light)}
  .menu-icon{width:38px;height:38px;border-radius:10px;background:var(--gray-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .menu-info{flex:1}
  .menu-label{font-size:14px;font-weight:600;color:var(--black)}
  .menu-value{font-size:12px;color:var(--gray-text);margin-top:1px}
  .menu-arrow{color:var(--gray-text);font-size:16px}
  .divider{height:1px;background:var(--gray-mid);margin:0 20px}
  .bottom-nav{position:absolute;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gray-mid);display:flex;justify-content:space-around;padding:12px 0 20px}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;text-decoration:none}
  .nav-icon{font-size:20px}
  .nav-label{font-size:10px;color:var(--gray-text);font-weight:500}
  .logout-btn{margin:16px 20px;padding:13px;background:#FEE2E2;color:#DC2626;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;width:calc(100% - 40px);text-align:center}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="header">
    <a href="../dashboard/code.html" class="back-btn">←</a>
    <span class="header-title">Minha Conta</span>
  </div>
  <div class="avatar-section">
    <div class="avatar">U <div class="avatar-edit">✏️</div></div>
    <div class="user-name">User</div>
    <div class="user-email">user@gmail.com.br</div>
  </div>
  <div class="menu-list">
    <div class="menu-section-title">Dados da conta</div>
    <a href="../alterar-senha/code.html" class="menu-item">
      <div class="menu-icon">📧</div>
      <div class="menu-info">
        <div class="menu-label">Alterar E-mail</div>
        <div class="menu-value">user@gmail.com.br</div>
      </div>
      <span class="menu-arrow">›</span>
    </a>
    <div class="divider"></div>
    <a href="../alterar-senha/code.html" class="menu-item">
      <div class="menu-icon">📱</div>
      <div class="menu-info">
        <div class="menu-label">Alterar WhatsApp</div>
        <div class="menu-value">+55 (85) 99988-0084</div>
      </div>
      <span class="menu-arrow">›</span>
    </a>
    <div class="divider"></div>
    <a href="../alterar-senha/code.html" class="menu-item">
      <div class="menu-icon">🔒</div>
      <div class="menu-info">
        <div class="menu-label">Alterar Senha</div>
        <div class="menu-value">••••••••</div>
      </div>
      <span class="menu-arrow">›</span>
    </a>

    <div class="menu-section-title">Configurações</div>
    <a href="../convites/code.html" class="menu-item">
      <div class="menu-icon">👥</div>
      <div class="menu-info">
        <div class="menu-label">Gerenciar Convites</div>
        <div class="menu-value">3 convites pendentes</div>
      </div>
      <span class="menu-arrow">›</span>
    </a>
    <div class="divider"></div>
    <a href="../compartilhar-locais/code.html" class="menu-item">
      <div class="menu-icon">🔗</div>
      <div class="menu-info">
        <div class="menu-label">Compartilhar Locais</div>
      </div>
      <span class="menu-arrow">›</span>
    </a>

    <button class="logout-btn" onclick="window.location.href='../login/code.html'">Sair da conta</button>
  </div>
  <div class="bottom-nav">
    <a href="../dashboard/code.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a href="../analise-presenca/code.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">Análise</span></a>
    <a href="../gerenciar-local/code.html" class="nav-item"><span class="nav-icon">🏪</span><span class="nav-label">Local</span></a>
    <a href="../convites/code.html" class="nav-item"><span class="nav-icon">👥</span><span class="nav-label">Convites</span></a>
    <a href="../editar-perfil/code.html" class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-label" style="color:var(--blue)">Conta</span></a>
  </div>
</div>
</body>
</html>
