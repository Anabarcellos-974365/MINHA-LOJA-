<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja - Alterar Senha</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--blue:#1A56FF;--blue-dark:#1240CC;--gray-light:#F5F7FA;--gray-mid:#E2E8F0;--gray-text:#6B7280;--black:#0F172A;--white:#FFFFFF}
  body{font-family:'Sora',sans-serif;background:var(--gray-light);min-height:100vh;display:flex;align-items:center;justify-content:center}
  .phone-frame{width:390px;min-height:844px;background:var(--white);border-radius:40px;box-shadow:0 32px 80px rgba(0,0,0,.15);overflow:hidden;display:flex;flex-direction:column}
  .header{background:var(--blue);padding:16px 20px;color:white;display:flex;align-items:center;gap:12px}
  .back-btn{color:white;text-decoration:none;font-size:18px}
  .header-title{font-size:14px;font-weight:700;flex:1}
  .header-close{color:white;text-decoration:none;font-size:18px}
  .content{padding:24px 24px 32px;flex:1;display:flex;flex-direction:column}
  h1{font-size:22px;font-weight:700;color:var(--black);margin-bottom:8px}
  .subtitle{font-size:13px;color:var(--gray-text);margin-bottom:24px;line-height:1.6}
  .form-group{margin-bottom:16px}
  label{display:block;font-size:12px;font-weight:600;color:var(--gray-text);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
  .pass-wrap{position:relative}
  input{width:100%;padding:13px 16px;border:1.5px solid var(--gray-mid);border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;color:var(--black);outline:none;transition:border-color .2s}
  input:focus{border-color:var(--blue)}
  .pass-wrap input{padding-right:44px}
  .toggle-pass{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-text);font-size:16px;padding:0}
  .actions{display:flex;gap:12px;margin-top:auto}
  .btn-secondary{flex:1;padding:14px;background:var(--white);color:var(--gray-text);border:1.5px solid var(--gray-mid);border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:block}
  .btn-primary{flex:1;padding:14px;background:var(--blue);color:white;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:block}
  .btn-primary:hover{background:var(--blue-dark)}
  .info-box{background:#EFF6FF;border-radius:10px;padding:12px;margin-bottom:20px;font-size:12px;color:#1E40AF;line-height:1.5}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="header">
    <a href="../editar-perfil/code.html" class="back-btn">←</a>
    <span class="header-title">Alterar Senha</span>
    <a href="../dashboard/code.html" class="header-close">✕</a>
  </div>
  <div class="content">
    <h1>Alterar senha</h1>
    <p class="subtitle">Se você alterar sua senha, será desconectado de todas as suas sessões ativas da Minha Loja, exceto do que está usando no momento.</p>
    <div class="info-box">
      🔒 Sua senha deve ter pelo menos 8 caracteres. Use letras, números e símbolos para maior segurança.
    </div>
    <div class="form-group">
      <label>Nova Senha</label>
      <div class="pass-wrap">
        <input type="password" placeholder="Nova senha" id="s1">
        <button class="toggle-pass" onclick="t('s1')">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label>Confirmar Senha</label>
      <div class="pass-wrap">
        <input type="password" placeholder="Confirmar senha" id="s2">
        <button class="toggle-pass" onclick="t('s2')">👁</button>
      </div>
    </div>
    <div class="actions">
      <a href="../editar-perfil/code.html" class="btn-secondary">Cancelar</a>
      <a href="../editar-perfil/code.html" class="btn-primary">Concluir</a>
    </div>
  </div>
</div>
<script>
  function t(id){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password'}
</script>
</body>
</html>
